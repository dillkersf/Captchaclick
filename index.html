<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    body {
      font-family: sans-serif;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
 
    .container {
      text-align: center;
    }
 
    .title {
      margin-bottom: 24px;
      font-family: 'Libre Barcode 39 Text', cursive;
      font-size: 6.5vw;
      white-space: nowrap;
    }
 
    /* Each flickering letter: the "real" letter with its replacement stacked on top */
    .flicker-wrap {
      position: relative;
      display: inline-block;
    }
 
    .real {
      display: inline-block;
      animation: flicker-real 5s infinite;
    }
 
    .alt {
      position: absolute;
      left: 0;
      top: 0;
      display: inline-block;
      opacity: 0;
      animation: flicker-alt 5s infinite;
    }
 
    /* H and E flicker in sync — no offset — so CLICKER reads together */
    .real-h, .alt-l, .real-e, .alt-c { animation-delay: 0s; }
 
    @keyframes flicker-real {
      0%   { opacity: 1; }
      4%   { opacity: 0.8; }
      5%   { opacity: 1; }
      11%  { opacity: 0.85; }
      12%  { opacity: 1; }
      /* dying stretch — erratic */
      36%  { opacity: 1; }
      37%  { opacity: 0.4; }
      39%  { opacity: 0.85; }
      41%  { opacity: 0.1; }
      43%  { opacity: 0.55; }
      45%  { opacity: 0.05; }
      47%  { opacity: 0; }
      /* hold — alt letter readable here */
      63%  { opacity: 0; }
      /* snap back */
      65%  { opacity: 0.6; }
      66%  { opacity: 0.15; }
      67%  { opacity: 1; }
      82%  { opacity: 1; }
      83%  { opacity: 0.5; }
      84%  { opacity: 1; }
      100% { opacity: 1; }
    }
 
    @keyframes flicker-alt {
      0%   { opacity: 0; }
      4%   { opacity: 0.2; }
      5%   { opacity: 0; }
      11%  { opacity: 0.15; }
      12%  { opacity: 0; }
      36%  { opacity: 0; }
      37%  { opacity: 0.6; }
      39%  { opacity: 0.15; }
      41%  { opacity: 0.9; }
      43%  { opacity: 0.45; }
      45%  { opacity: 0.95; }
      47%  { opacity: 1; }
      /* hold — fully visible */
      63%  { opacity: 1; }
      65%  { opacity: 0.4; }
      66%  { opacity: 0.8; }
      67%  { opacity: 0; }
      82%  { opacity: 0; }
      83%  { opacity: 0.5; }
      84%  { opacity: 0; }
      100% { opacity: 0; }
    }
 
    .links {
      display: flex;
      justify-content: center;
    }
 
    a {
      color: #1a0dab;
      text-decoration: underline;
      font-size: 20px;
    }
 
    a:visited { color: #1a0dab; }
    a:hover   { color: #1a0dab; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">HUMAN C<span class="flicker-wrap"><span class="real real-h">H</span><span class="alt alt-l">L</span></span><span class="flicker-wrap"><span class="real real-e">E</span><span class="alt alt-c">I</span></span>CKER</div>
    <div class="links">
      <a href="click.html">CLICK</a>
    </div>
  </div>
</body>
</html>
