<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLICK</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #ffffff;
    --ink: #111;
    --gray: #888;
    --active-bg: #c8c8c8;
    --pass: #1a1a1a;
    --fail: #1a1a1a;
    --accent-pass: #2d6a4f;
    --accent-fail: #9b2226;
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: sans-serif;
    user-select: none;
    cursor: crosshair;
    overflow: hidden;
  }
 
  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }
 
  /* ── NAV ── */
  nav {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 28px 40px 0;
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 10;
  }
  .nav-title {
    font-size: clamp(22px, 3.9vw, 45px);
    font-weight: normal;
    color: var(--ink);
  }
  .nav-home {
    font-size: clamp(22px, 3.9vw, 45px);
    font-weight: normal;
    color: #2255cc;
    text-decoration: underline;
    cursor: pointer;
    background: none; border: none;
    font-family: sans-serif;
  }
  .nav-home:hover { color: #0033aa; }
 
  /* ── HOME SCREEN ── */
  #screen-home {
    justify-content: center;
    padding: 0 80px;
    gap: 0;
  }
  .home-instruction {
    font-size: clamp(28px, 5vw, 58px);
    line-height: 1.15;
    color: var(--ink);
    max-width: 520px;
  }
  .home-sub {
    margin-top: 32px;
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hand-img {
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: clamp(300px, 55vw, 680px);
    pointer-events: none;
  }
  .start-hint {
    margin-top: 52px;
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
 
  /* ── TEST SCREEN ── */
  #screen-test {
    justify-content: center;
    align-items: center;
    background: var(--bg);
    transition: background 0.08s ease, opacity 0.4s ease;
  }
  #screen-test.holding { background: var(--active-bg); }
 
  .test-center {
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    position: relative; z-index: 2;
  }
  .phase-label {
    font-size: clamp(48px, 9vw, 110px);
    line-height: 1;
    color: var(--ink);
    transition: opacity 0.3s;
  }
  .phase-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
    margin-top: 14px;
  }
  .live-timer {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--gray);
    margin-top: 28px;
    font-variant-numeric: tabular-nums;
    min-height: 20px;
  }
  .progress-track {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .progress-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  .progress-dot.done { background: var(--ink); }
  .progress-dot.active { background: var(--gray); }
 
  /* ── RESULT SCREEN ── */
  #screen-result {
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .result-inner {
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
  }
  .result-verdict {
    font-size: clamp(22px, 3.9vw, 45px);
    line-height: 1;
    font-weight: normal;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .result-verdict.pass { color: var(--accent-pass); }
  .result-verdict.fail { color: var(--accent-fail); }

  .result-drift {
    margin-top: 10px;
    font-size: clamp(13px, 1.8vw, 20px); letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .result-scores {
    margin-top: 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .score-row {
    display: flex; align-items: baseline; gap: 16px;
    justify-content: center;
    white-space: nowrap;
  }
  .score-target {
    font-size: clamp(13px, 1.8vw, 20px); letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink); min-width: 110px; text-align: right;
  }
  .score-val {
    font-size: clamp(13px, 1.8vw, 20px); font-weight: normal; line-height: 1;
    color: var(--ink); min-width: 70px; text-align: left;
  }
  .score-off {
    font-size: clamp(13px, 1.8vw, 20px); color: var(--gray); letter-spacing: 0.06em;
    text-align: left;
  }
  .score-off.pass-color { color: var(--gray); }
  .score-off.fail-color { color: var(--gray); }

  .result-conclusion {
    margin-top: 20px;
    font-size: clamp(13px, 1.8vw, 20px); letter-spacing: 0.14em; line-height: 1.8;
    text-transform: uppercase;
    color: var(--ink);
  }

  .result-actions {
    margin-top: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .retry-btn {
    font-family: sans-serif;
    font-size: clamp(22px, 3.9vw, 45px);
    font-weight: normal;
    color: #2255cc;
    text-decoration: underline;
    cursor: pointer;
    background: none; border: none;
    padding: 0;
    transition: color 0.2s;
  }
  .retry-btn:hover { color: #0033aa; }
  .home-link {
    font-size: clamp(22px, 3.9vw, 45px);
    font-weight: normal;
    color: #2255cc;
    text-decoration: underline;
    cursor: pointer;
    background: none; border: none;
    font-family: sans-serif;
    padding: 0;
  }
  .home-link:hover { color: #0033aa; }
</style>
</head>

<!-- ══ TEST ══ -->
<div id="screen-test" class="screen">
  <nav>
    <span class="nav-title">HUMAN CHECKER</span>
    <a class="nav-home" href="index.html">HOME</a>
  </nav>
  <div class="test-center">
    <div class="phase-label" id="phase-label">HOLD</div>
    <div class="phase-sub" id="phase-sub">PRESS AND HOLD FOR 3 SECONDS</div>
    <div class="live-timer" id="live-timer"></div>
  </div>
  <div class="progress-track">
    <div class="progress-dot active" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
  </div>
</div>
 
<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <nav>
    <span class="nav-title">HUMAN CHECKER</span>
    <a class="nav-home" href="index.html">HOME</a>
  </nav>
  <div class="result-inner">
    <div class="result-verdict" id="result-verdict">HUMAN</div>
    <div class="result-drift" id="result-drift">TOTAL DRIFT 0MS</div>

    <div class="result-scores">
      <div class="score-row">
        <div class="score-target">3 SEC HOLD</div>
        <div class="score-val" id="score-1">—</div>
        <div class="score-off" id="off-1"></div>
      </div>
      <div class="score-row">
        <div class="score-target">2 SEC HOLD</div>
        <div class="score-val" id="score-2">—</div>
        <div class="score-off" id="off-2"></div>
      </div>
    </div>

    <p class="result-conclusion" id="result-conclusion"></p>
    <div class="result-actions">
      <button class="retry-btn" id="retry-btn">TRY AGAIN?</button>
      <div id="pass-links" style="display:none; flex-direction:column; align-items:center; gap:4px;">
        <a class="home-link" href="index.html">CONTINUE</a>
        <a class="home-link" href="click.html">HOME</a>
      </div>
      <a class="home-link" id="home-link-default" href="click.html">HOME</a>
    </div>
  </div>
</div>
 
<script>
  const TARGETS = [3000, 2000]; // ms
  const TOLERANCE = 50; // within ±50ms = "too perfect" = FAIL (bot)
 
  let phase = 0;        // 0 = first hold, 1 = second hold
  let holdStart = null;
  let durations = [];
  let timerRAF = null;
  let holding = false;
 
  const screens = {
    home: document.getElementById('screen-home'),
    test: document.getElementById('screen-test'),
    result: document.getElementById('screen-result'),
  };
 
  function show(name) {
    Object.entries(screens).forEach(([k, el]) => {
      el.classList.toggle('active', k === name);
    });
  }
 
  function goHome() {
    phase = 0; durations = []; holdStart = null; holding = false;
    clearRAF();
    document.getElementById('screen-test').classList.remove('holding');
    updateTestUI();
    show('home');
  }
 
  document.querySelectorAll('#retry-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); goHome(); });
  });
 
  // Home: click to start
  screens.home.addEventListener('mousedown', startTest);
  screens.home.addEventListener('touchstart', e => { e.preventDefault(); startTest(); }, {passive: false});
 
  function startTest() {
    phase = 0; durations = [];
    updateTestUI();
    show('test');
  }
 
  function updateTestUI() {
    const labels = ['HOLD', 'HOLD'];
    const subs = ['PRESS AND HOLD FOR 3 SECONDS', 'PRESS AND HOLD FOR 2 SECONDS'];
    document.getElementById('phase-label').textContent = labels[phase] || 'DONE';
    document.getElementById('phase-sub').textContent = subs[phase] || '';
    document.getElementById('live-timer').textContent = '';
    document.getElementById('dot-1').className = 'progress-dot ' + (phase === 0 ? 'active' : 'done');
    document.getElementById('dot-2').className = 'progress-dot ' + (phase === 1 ? 'active' : phase > 1 ? 'done' : '');
  }
 
  // Test screen events
  const testEl = screens.test;
 
  testEl.addEventListener('mousedown', onPressStart);
  testEl.addEventListener('mouseup', onPressEnd);
  testEl.addEventListener('touchstart', e => { e.preventDefault(); onPressStart(); }, {passive: false});
  testEl.addEventListener('touchend', e => { e.preventDefault(); onPressEnd(); }, {passive: false});
 
  function onPressStart(e) {
    if (e && (e.target.classList.contains('nav-home') || e.target.tagName === 'A')) return;
    if (holding) return;
    holding = true;
    holdStart = performance.now();
    testEl.classList.add('holding');
    startLiveTimer();
  }
 
  function onPressEnd() {
    if (!holding) return;
    holding = false;
    testEl.classList.remove('holding');
    clearRAF();
    const elapsed = performance.now() - holdStart;
    durations.push(elapsed);
    document.getElementById('live-timer').textContent = '';
 
    if (phase < TARGETS.length - 1) {
      phase++;
      updateTestUI();
    } else {
      // done
      showResult();
    }
  }
 
  function startLiveTimer() {
    function tick() {
      if (!holding) return;
      const t = performance.now() - holdStart;
      document.getElementById('live-timer').textContent = (t / 1000).toFixed(3) + 's';
      timerRAF = requestAnimationFrame(tick);
    }
    timerRAF = requestAnimationFrame(tick);
  }
 
  function clearRAF() {
    if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
  }

  function showResult() {
    const d1 = durations[0], d2 = durations[1];
    const off1 = Math.round(d1 - TARGETS[0]);
    const off2 = Math.round(d2 - TARGETS[1]);
    const abs1 = Math.abs(off1), abs2 = Math.abs(off2);
    const totalOff = abs1 + abs2;

    // FAIL = too perfect (within tolerance on BOTH)
    const tooPerfect = abs1 <= TOLERANCE && abs2 <= TOLERANCE;
    const isHuman = !tooPerfect;

    document.getElementById('result-verdict').textContent = isHuman ? 'CONFIRMED AS HUMAN' : 'FAILED';
    document.getElementById('result-verdict').className = 'result-verdict ' + (isHuman ? 'pass' : 'fail');
    document.getElementById('result-drift').textContent = `TOTAL DRIFT ${totalOff}MS`;

    // Scores
    document.getElementById('score-1').textContent = (d1 / 1000).toFixed(3) + 's';
    document.getElementById('score-2').textContent = (d2 / 1000).toFixed(3) + 's';

    function offLabel(off) {
      const sign = off >= 0 ? '+' : '';
      return `${sign}${off}ms off target`;
    }
    document.getElementById('off-1').textContent = offLabel(off1);
    document.getElementById('off-2').textContent = offLabel(off2);

    const concl = document.getElementById('result-conclusion');
    concl.textContent = isHuman ? '' : 'SUSPICIOUS. PLEASE TRY AGAIN';

    // Show pass links (continue + home) on pass, default home link on fail
    const passLinks = document.getElementById('pass-links');
    const homeDefault = document.getElementById('home-link-default');
    if (isHuman) {
      passLinks.style.display = 'flex';
      homeDefault.style.display = 'none';
    } else {
      passLinks.style.display = 'none';
      homeDefault.style.display = '';
    }

    show('result');
  }

  // Dev cheat: type "33" on both timed screens to trigger fail machine
  let devBuffer = '';
  document.addEventListener('keydown', function(e) {
    if (!screens.test.classList.contains('active')) { devBuffer = ''; return; }
    devBuffer += e.key;
    if (devBuffer.length > 4) devBuffer = devBuffer.slice(-4);
    if (devBuffer.includes('33')) {
      devBuffer = '';
      clearRAF();
      holding = false;
      testEl.classList.remove('holding');
      // Force fail by using exactly-on-target durations
      durations = [TARGETS[0], TARGETS[1]];
      showResult();
    }
  });
</script>
